  <ellipse cx="8" cy="9" rx="5" ry="6" fill="#C8A882"/>
  <ellipse cx="8" cy="9" rx="3" ry="4" fill="#E8B4B8"/>
  <ellipse cx="24" cy="9" rx="5" ry="6" fill="#C8A882"/>
  <ellipse cx="24" cy="9" rx="3" ry="4" fill="#E8B4B8"/>
  <!-- Eyes -->
  <circle cx="11" cy="16" r="2.5" fill="#1a1a1a"/>
  <circle cx="21" cy="16" r="2.5" fill="#1a1a1a"/>
  <circle cx="11.8" cy="15.2" r="0.8" fill="white"/>
