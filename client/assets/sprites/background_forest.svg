<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="600" viewBox="0 0 2000 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- subtle top sky -->
    <linearGradient id="forestSky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2E5B4A"/>
      <stop offset="1" stop-color="#6AAE8A"/>
    </linearGradient>

    <!-- canopy silhouette color -->
    <linearGradient id="canopy" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1F4B3A"/>
      <stop offset="1" stop-color="#2E6B4F"/>
    </linearGradient>

    <!-- tree trunk -->
    <g id="tree">
      <rect x="-12" y="0" width="24" height="160" rx="6" fill="#5A3B2A" stroke="#000" stroke-width="1"/>
      <ellipse cx="0" cy="-40" rx="80" ry="60" fill="#2E6B4F" stroke="#000" stroke-width="1.2"/>
      <ellipse cx="-30" cy="-20" rx="40" ry="30" fill="#3F7F5F" stroke="#000" stroke-width="0.9"/>
      <ellipse cx="30" cy="-20" rx="40" ry="30" fill="#3F7F5F" stroke="#000" stroke-width="0.9"/>
    </g>

    <!-- mid tree (simpler) -->
    <g id="midTree">
      <rect x="-8" y="0" width="16" height="120" rx="4" fill="#6B4A36" stroke="#000" stroke-width="0.9"/>
      <circle cx="0" cy="-30" r="48" fill="#3E7A5F" stroke="#000" stroke-width="0.9"/>
    </g>

    <!-- fern / mushroom -->
    <g id="fern">
      <path d="M0 0 q6 -10 12 -6 q-6 -8 -12 -6 q6 -10 12 -6" fill="#2E8B57" stroke="#000" stroke-width="0.6"/>
    </g>

    <!-- light shaft -->
    <linearGradient id="lightShaft" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FFF1A8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#FFF1A8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- BACK: deep forest sky -->
  <rect x="0" y="0" width="2000" height="600" fill="url(#forestSky)"/>

  <!-- FAR CANOPY silhouettes -->
  <g id="canopy-far" opacity="0.95">
    <path d="M0 120 C150 80 300 120 500 100 C700 80 900 120 1100 100 C1300 80 1500 120 2000 100 L2000 600 L0 600 Z"
          fill="url(#canopy)"/>
    <path d="M0 160 C200 120 400 160 600 140 C800 120 1000 160 1400 140 C1600 120 2000 160 L2000 600 L0 600 Z"
          fill="#244B3A" opacity="0.9"/>
  </g>

  <!-- MID LAYER: more detailed trees repeated across -->
  <g id="mid-trees">
    <g transform="translate(120,220) scale(1.2)">
      <use href="#tree"/>
    </g>
    <g transform="translate(420,240) scale(1.0)">
      <use href="#tree"/>
    </g>
    <g transform="translate(760,210) scale(1.3)">
      <use href="#tree"/>
    </g>
    <g transform="translate(1120,230) scale(1.1)">
      <use href="#tree"/>
    </g>
    <g transform="translate(1500,220) scale(1.2)">
      <use href="#tree"/>
    </g>
    <g transform="translate(1840,240) scale(1.0)">
      <use href="#tree"/>
    </g>
  </g>

  <!-- LIGHT SHAFTS cutting through canopy -->
  <g id="shafts" opacity="0.9">
    <rect x="300" y="0" width="120" height="600" fill="url(#lightShaft)" transform="skewX(-12)"/>
    <rect x="1000" y="0" width="140" height="600" fill="url(#lightShaft)" transform="skewX(-8)"/>
    <rect x="1600" y="0" width="100" height="600" fill="url(#lightShaft)" transform="skewX(-10)"/>
  </g>

  <!-- FOREGROUND TREES (closer, darker trunks and leaves) -->
  <g id="foreground-trees">
    <g transform="translate(60,300) scale(1.0)">
      <use href="#midTree"/>
    </g>
    <g transform="translate(260,320) scale(1.1)">
      <use href="#midTree"/>
    </g>
    <g transform="translate(520,300) scale(1.2)">
      <use href="#midTree"/>
    </g>
    <g transform="translate(920,320) scale(1.15)">
      <use href="#midTree"/>
    </g>
    <g transform="translate(1320,300) scale(1.2)">
      <use href="#midTree"/>
    </g>
    <g transform="translate(1720,320) scale(1.05)">
      <use href="#midTree"/>
    </g>
  </g>

  <!-- FLOOR: ferns, mushrooms, logs -->
  <g id="forest-floor" transform="translate(0,420)">
    <!-- long fern band -->
    <rect x="0" y="0" width="2000" height="180" fill="#2E6B4A"/>
    <!-- clusters -->
    <g transform="translate(80,40)">
      <use href="#fern" transform="translate(0,0) scale(1.6)"/>
      <use href="#fern" transform="translate(40,6) scale(1.2)"/>
      <ellipse cx="20" cy="60" rx="8" ry="6" fill="#8B5A3C" stroke="#000" stroke-width="0.6"/>
    </g>

    <g transform="translate(420,30)">
      <use href="#fern" transform="translate(0,0) scale(1.8)"/>
      <ellipse cx="40" cy="64" rx="10" ry="7" fill="#8B5A3C" stroke="#000" stroke-width="0.6"/>
    </g>

    <g transform="translate(760,40)">
      <use href="#fern" transform="translate(0,0) scale(1.5)"/>
      <ellipse cx="30" cy="62" rx="9" ry="6" fill="#8B5A3C" stroke="#000" stroke-width="0.6"/>
    </g>

    <g transform="translate(1200,36)">
      <use href="#fern" transform="translate(0,0) scale(1.7)"/>
      <ellipse cx="36" cy="66" rx="10" ry="7" fill="#8B5A3C" stroke="#000" stroke-width="0.6"/>
    </g>

    <g transform="translate(1640,40)">
      <use href="#fern" transform="translate(0,0) scale(1.4)"/>
      <ellipse cx="28" cy="62" rx="8" ry="6" fill="#8B5A3C" stroke="#000" stroke-width="0.6"/>
    </g>
  </g>
</svg>