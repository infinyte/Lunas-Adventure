<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .btn { fill:#4A90E2; stroke:#2B6FB0; stroke-width:2; rx:8; ry:8; }
      .shadow { fill:#2B6FB0; opacity:0.12; }
      .bar { fill:#FFFFFF; rx:2; ry:2; }
    </style>
  </defs>

  <!-- button base -->
  <rect class="btn" x="2" y="2" width="36" height="36" rx="8" ry="8"/>
  <!-- subtle bottom-edge shadow for depth -->
  <rect class="shadow" x="4" y="28" width="32" height="6" rx="6" ry="6"/>
  <!-- pause bars -->
  <rect class="bar" x="12" y="10" width="4" height="20" rx="2" ry="2"/>
  <rect class="bar" x="24" y="10" width="4" height="20" rx="2" ry="2"/>
</svg>