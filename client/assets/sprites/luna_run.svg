<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40" width="60" height="40">
  <!-- Luna the Guinea Pig – run pose (body tilted forward, legs extended) -->
  <!-- Body (tilted forward) -->
  <ellipse cx="30" cy="25" rx="22" ry="11" fill="#C8A882" transform="rotate(-8 30 25)"/>
  <!-- Head (pushed forward) -->
  <ellipse cx="48" cy="16" rx="11" ry="9" fill="#C8A882"/>
  <!-- Ear (left) -->
  <ellipse cx="42" cy="8" rx="3.5" ry="5.5" fill="#C8A882" transform="rotate(-10 42 8)"/>
  <ellipse cx="42" cy="8" rx="2" ry="3.5" fill="#E8B4B8" transform="rotate(-10 42 8)"/>
  <!-- Ear (right) -->
  <ellipse cx="51" cy="7" rx="3.5" ry="5.5" fill="#C8A882" transform="rotate(5 51 7)"/>
  <ellipse cx="51" cy="7" rx="2" ry="3.5" fill="#E8B4B8" transform="rotate(5 51 7)"/>
  <!-- Eye -->
  <circle cx="54" cy="14" r="2.5" fill="#1a1a1a"/>
  <circle cx="55" cy="13" r="0.8" fill="white"/>
  <!-- Nose -->
  <ellipse cx="58" cy="18" rx="1.8" ry="1.3" fill="#E8B4B8"/>
  <!-- Legs (running stride – alternating extension) -->
  <line x1="16" y1="31" x2="8" y2="39" stroke="#A07850" stroke-width="4" stroke-linecap="round"/>
  <line x1="24" y1="33" x2="28" y2="39" stroke="#A07850" stroke-width="4" stroke-linecap="round"/>
  <line x1="36" y1="33" x2="32" y2="39" stroke="#A07850" stroke-width="4" stroke-linecap="round"/>
  <line x1="44" y1="31" x2="50" y2="38" stroke="#A07850" stroke-width="4" stroke-linecap="round"/>
  <!-- Tail (streaming back) -->
  <ellipse cx="9" cy="26" rx="4" ry="2.5" fill="#A07850" transform="rotate(10 9 26)"/>
  <!-- Fur highlight -->
  <ellipse cx="34" cy="21" rx="8" ry="3.5" fill="#D4B896" opacity="0.6" transform="rotate(-8 34 21)"/>
</svg>
