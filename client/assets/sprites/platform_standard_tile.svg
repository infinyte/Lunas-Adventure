<svg xmlns="http://www.w3.org/2000/svg" width="64" height="20" viewBox="0 0 64 20" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .outline { stroke:#000000; stroke-width:1.8; stroke-linejoin:round; stroke-linecap:round; }
      .plank { fill:#A0522D; }
      .highlight { fill:#C07A4A; }
      .shadow { fill:#7A3F1F; }
      .grain { stroke:#7A3F1F; stroke-width:1; stroke-linecap:round; opacity:0.95; }
      .knot { fill:#7A3F1F; stroke:#000000; stroke-width:0.9; }
    </style>
  </defs>

  <!-- Base plank (straight vertical edges so tile is horizontally seamless) -->
  <rect class="plank outline" x="0.9" y="1" width="62.2" height="18" rx="2" ry="2"/>

  <!-- Top highlight strip (slightly lighter) - designed to repeat across tiles -->
  <path class="highlight outline" d="
    M0 1.8
    C6 0.2, 12 3.2, 18 1.8
    C24 0.4, 30 3.2, 36 1.8
    C42 0.4, 48 3.2, 54 1.8
    C58 0.8, 62 2.6, 64 1.8
    L64 6
    L0 6 Z" />

  <!-- Bottom shadow band -->
  <rect class="shadow" x="0.9" y="13.5" width="62.2" height="5.5" rx="1" ry="1"/>

  <!-- Wood grain lines (repeat-friendly positions) -->
  <path class="grain" d="M6 5 q6 2 12 0 q6 -2 12 0 q6 2 12 0" fill="none" />
  <path class="grain" d="M4 8 q8 3 16 0 q8 -3 16 0" fill="none" />
  <path class="grain" d="M10 11 q6 -2 12 0 q6 2 12 0" fill="none" />

  <!-- Knot holes (placed so edges tile seamlessly) -->
  <g>
    <ellipse class="knot" cx="10" cy="10" rx="3.6" ry="2.6"/>
    <ellipse class="knot" cx="30" cy="8" rx="2.8" ry="2.0"/>
    <ellipse class="knot" cx="50" cy="11" rx="3.2" ry="2.2"/>
    <!-- subtle inner rings for knots -->
    <ellipse cx="10" cy="10" rx="1.6" ry="1.0" fill="#A0522D" opacity="0.9"/>
    <ellipse cx="30" cy="8" rx="1.2" ry="0.8" fill="#A0522D" opacity="0.9"/>
    <ellipse cx="50" cy="11" rx="1.4" ry="0.9" fill="#A0522D" opacity="0.9"/>
  </g>
</svg>