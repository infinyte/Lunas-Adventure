<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .outline { stroke:#000000; stroke-width:1.0; stroke-linejoin:round; stroke-linecap:round; }
      .gold { fill:#FFD24D; }
      .gold-dark { fill:#D99A2A; }
      .leaf { fill:#CDEB6A; }
      .leaf-dark { fill:#B7D24A; }
      .spark { fill:#FFF7C6; stroke:#000; stroke-width:0.6; opacity:0; }
    </style>
  </defs>

  <!-- bobbing group -->
  <g transform="translate(0,0)">
    <animateTransform attributeName="transform" type="translate"
                      values="0 0; 0 -3; 0 0" dur="1.2s" repeatCount="indefinite"/>

    <!-- rotate to match carrot angle -->
    <g transform="rotate(-18 15 12)">
      <!-- leaves -->
      <g transform="translate(6,2)">
        <path class="leaf outline" d="M6 2 C2 -2, 0 4, 6 6 C8 7, 10 6, 12 4 C10 3, 8 2, 6 2 Z"/>
        <path class="leaf-dark outline" d="M10 1 C8 -1, 6 3, 10 4" />
        <path class="leaf outline" d="M12 3 C9 -1, 14 -1, 16 3 C15 4, 13 4, 12 3 Z"/>
        <path class="leaf-dark outline" d="M14 2 C13 0, 12 3, 14 4" />
        <path class="leaf outline" d="M4 3 C1 -1, -2 2, 4 6 C6 7, 8 6, 9 4 C7 3, 5 3, 4 3 Z"/>
        <path class="leaf-dark outline" d="M5 2 C4 0, 3 3, 5 4" />
      </g>

      <!-- golden carrot body -->
      <g transform="translate(0,6)">
        <path class="gold outline" d="M8 2 C6 6, 6 12, 10 18 C12 21, 16 22, 20 18 C22 15, 22 12, 20 9 C18 6, 14 4, 8 2 Z"/>
        <path class="gold-dark" d="M12 12 C13 14, 15 15, 17 14 C18 13, 18 12, 17 11 C15 10, 13 11, 12 12 Z"/>
        <path class="outline" d="M10 6 C11 7, 13 8, 15 9 C14 8, 12 7, 10 6 Z" fill="#FFF7C6"/>
        <path class="outline" d="M20 18 C21 19, 22 19, 22 20 C21 19, 20 19, 20 18 Z" fill="#D99A2A"/>
      </g>

      <!-- sparkles (3) with staggered fade in/out -->
      <g>
        <polygon class="spark" points="2,2 3.5,6 7,6 4,8 5,12 2,9 -1,12 0,8 -3,6 1,6"
                 transform="translate(2,2) scale(0.6)">
          <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="0s" repeatCount="indefinite"/>
        </polygon>

        <polygon class="spark" points="2,2 3.5,6 7,6 4,8 5,12 2,9 -1,12 0,8 -3,6 1,6"
                 transform="translate(22,4) scale(0.5)">
          <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="0.35s" repeatCount="indefinite"/>
        </polygon>

        <polygon class="spark" points="2,2 3.5,6 7,6 4,8 5,12 2,9 -1,12 0,8 -3,6 1,6"
                 transform="translate(18,18) scale(0.45)">
          <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="0.7s" repeatCount="indefinite"/>
        </polygon>
      </g>
    </g>
  </g>
</svg>