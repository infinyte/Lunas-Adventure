<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .star { fill:#FFF9C9; stroke:#F7D84D; stroke-width:0.8; opacity:0; }
      .star-blue { fill:#DFF6FF; stroke:#9FDFFF; stroke-width:0.8; }
      .star-yellow { fill:#FFF9C9; stroke:#FFD24D; stroke-width:0.8; }
      .star-white { fill:#FFFFFF; stroke:#F0F0F0; stroke-width:0.6; }
    </style>
  </defs>

  <!-- center point -->
  <g transform="translate(15,15)">
    <!-- 6 small stars burst outward, rotate and fade over 0.5s -->
    <g id="burst">
      <!-- star 1 -->
      <polygon class="star star-yellow" points="0,-3 1,-1 3,0 1,1 0,3 -1,1 -3,0 -1,-1"
               transform="translate(0,0) scale(0.6)">
        <animate attributeName="opacity" values="1;1;0" dur="0.5s" begin="0s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="-10 -12" dur="0.5s" begin="0s" fill="freeze"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="45" dur="0.5s" begin="0s" additive="sum" fill="freeze"/>
      </polygon>

      <!-- star 2 -->
      <polygon class="star star-white" points="0,-3 1,-1 3,0 1,1 0,3 -1,1 -3,0 -1,-1"
               transform="translate(0,0) scale(0.5)">
        <animate attributeName="opacity" values="1;1;0" dur="0.5s" begin="0.05s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="12 -8" dur="0.5s" begin="0.05s" fill="freeze"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-30" dur="0.5s" begin="0.05s" additive="sum" fill="freeze"/>
      </polygon>

      <!-- star 3 -->
      <polygon class="star star-blue" points="0,-3 1,-1 3,0 1,1 0,3 -1,1 -3,0 -1,-1"
               transform="translate(0,0) scale(0.55)">
        <animate attributeName="opacity" values="1;1;0" dur="0.5s" begin="0.1s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="-6 14" dur="0.5s" begin="0.1s" fill="freeze"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="20" dur="0.5s" begin="0.1s" additive="sum" fill="freeze"/>
      </polygon>

      <!-- star 4 -->
      <polygon class="star star-yellow" points="0,-3 1,-1 3,0 1,1 0,3 -1,1 -3,0 -1,-1"
               transform="translate(0,0) scale(0.45)">
        <animate attributeName="opacity" values="1;1;0" dur="0.5s" begin="0.12s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="14 6" dur="0.5s" begin="0.12s" fill="freeze"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="60" dur="0.5s" begin="0.12s" additive="sum" fill="freeze"/>
      </polygon>

      <!-- star 5 -->
      <polygon class="star star-white" points="0,-3 1,-1 3,0 1,1 0,3 -1,1 -3,0 -1,-1"
               transform="translate(0,0) scale(0.4)">
        <animate attributeName="opacity" values="1;1;0" dur="0.5s" begin="0.18s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="-14 4" dur="0.5s" begin="0.18s" fill="freeze"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-45" dur="0.5s" begin="0.18s" additive="sum" fill="freeze"/>
      </polygon>

      <!-- star 6 -->
      <polygon class="star star-blue" points="0,-3 1,-1 3,0 1,1 0,3 -1,1 -3,0 -1,-1"
               transform="translate(0,0) scale(0.35)">
        <animate attributeName="opacity" values="1;1;0" dur="0.5s" begin="0.22s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="10 14" dur="0.5s" begin="0.22s" fill="freeze"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="30" dur="0.5s" begin="0.22s" additive="sum" fill="freeze"/>
      </polygon>
    </g>
  </g>
</svg>