<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40" width="60" height="40">
  <!-- Luna the Guinea Pig – jump pose (body arched, legs tucked) -->
  <!-- Body (slightly arched upward) -->
  <ellipse cx="28" cy="24" rx="20" ry="10" fill="#C8A882" transform="rotate(-12 28 24)"/>
  <!-- Head (raised, looking up-forward) -->
  <ellipse cx="46" cy="14" rx="11" ry="9" fill="#C8A882" transform="rotate(-15 46 14)"/>
  <!-- Ear (left, perked up) -->
  <ellipse cx="40" cy="5" rx="3.5" ry="6" fill="#C8A882"/>
  <ellipse cx="40" cy="5" rx="2" ry="4" fill="#E8B4B8"/>
  <!-- Ear (right, perked up) -->
  <ellipse cx="50" cy="4" rx="3.5" ry="6" fill="#C8A882"/>
  <ellipse cx="50" cy="4" rx="2" ry="4" fill="#E8B4B8"/>
  <!-- Eye (wide, excited) -->
  <circle cx="52" cy="12" r="3" fill="#1a1a1a"/>
  <circle cx="53" cy="11" r="1" fill="white"/>
  <!-- Nose -->
  <ellipse cx="56" cy="17" rx="1.8" ry="1.3" fill="#E8B4B8"/>
  <!-- Legs (tucked up) -->
  <line x1="18" y1="30" x2="12" y2="36" stroke="#A07850" stroke-width="4" stroke-linecap="round"/>
  <line x1="26" y1="32" x2="22" y2="37" stroke="#A07850" stroke-width="4" stroke-linecap="round"/>
  <line x1="36" y1="32" x2="40" y2="37" stroke="#A07850" stroke-width="4" stroke-linecap="round"/>
  <line x1="44" y1="30" x2="50" y2="35" stroke="#A07850" stroke-width="4" stroke-linecap="round"/>
  <!-- Tail (flipped up) -->
  <ellipse cx="9" cy="22" rx="4" ry="3" fill="#A07850" transform="rotate(-20 9 22)"/>
  <!-- Fur highlight -->
  <ellipse cx="30" cy="20" rx="7" ry="3" fill="#D4B896" opacity="0.6" transform="rotate(-12 30 20)"/>
  <!-- Motion lines -->
  <line x1="5" y1="28" x2="1" y2="28" stroke="#C8A882" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="5" y1="32" x2="0" y2="33" stroke="#C8A882" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
