<svg xmlns="http://www.w3.org/2000/svg" width="230" height="100" viewBox="0 0 230 100" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .dpad { fill:rgba(0,0,0,0.28); stroke:#000; stroke-width:1.2; }
      .jump { fill:rgba(46,204,176,0.9); stroke:#0F8F73; stroke-width:1.6; }
      .arrow { fill:#FFFFFF; stroke:#000; stroke-width:0.9; }
      .opacity { opacity:0.7; }
    </style>
  </defs>

  <!-- Left button group (id="btn-left") 70x70 at x=0 -->
  <g id="btn-left" transform="translate(0,0)">
    <rect x="10" y="10" width="70" height="70" rx="18" ry="18" class="dpad opacity"/>
    <!-- left chevron -->
    <g transform="translate(45,45) scale(0.9)">
      <path class="arrow" d="M-6 0 L2 -8 L2 -4 L10 -4 L10 4 L2 4 L2 8 Z"/>
    </g>
  </g>

  <!-- Right button group (id="btn-right") 70x70 at x=90 -->
  <g id="btn-right" transform="translate(90,0)">
    <rect x="10" y="10" width="70" height="70" rx="18" ry="18" class="dpad opacity"/>
    <!-- right chevron -->
    <g transform="translate(45,45) scale(0.9)">
      <path class="arrow" d="M6 0 L-2 -8 L-2 -4 L-10 -4 L-10 4 L-2 4 L-2 8 Z"/>
    </g>
  </g>

  <!-- Jump button group (id="btn-jump") 90x90 at x=180 (fits in canvas) -->
  <g id="btn-jump" transform="translate(180,5)">
    <rect x="0" y="0" width="90" height="90" rx="24" ry="24" class="jump opacity"/>
    <!-- upward arrow -->
    <g transform="translate(45,50) scale(0.9)">
      <path d="M0 -18 L-8 -6 L-4 -6 L-4 12 L4 12 L4 -6 L8 -6 Z" fill="#FFFFFF" stroke="#000" stroke-width="0.9"/>
    </g>
  </g>
</svg>