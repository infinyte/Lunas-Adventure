<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 40" width="60" height="40">
  <!-- Luna the Guinea Pig – idle pose -->
  <!-- Body -->
  <ellipse cx="30" cy="26" rx="22" ry="12" fill="#C8A882"/>
  <!-- Head -->
  <ellipse cx="46" cy="18" rx="12" ry="10" fill="#C8A882"/>
  <!-- Ear (left) -->
  <ellipse cx="40" cy="10" rx="4" ry="6" fill="#C8A882"/>
  <ellipse cx="40" cy="10" rx="2.5" ry="4" fill="#E8B4B8"/>
  <!-- Ear (right) -->
  <ellipse cx="50" cy="9" rx="4" ry="6" fill="#C8A882"/>
  <ellipse cx="50" cy="9" rx="2.5" ry="4" fill="#E8B4B8"/>
  <!-- Eye -->
  <circle cx="52" cy="16" r="2.5" fill="#1a1a1a"/>
  <circle cx="53" cy="15" r="0.8" fill="white"/>
  <!-- Nose -->
  <ellipse cx="57" cy="20" rx="2" ry="1.5" fill="#E8B4B8"/>
  <!-- Feet -->
  <ellipse cx="18" cy="36" rx="5" ry="3" fill="#A07850"/>
  <ellipse cx="30" cy="37" rx="5" ry="3" fill="#A07850"/>
  <ellipse cx="42" cy="36" rx="4" ry="3" fill="#A07850"/>
  <!-- Tail -->
  <ellipse cx="10" cy="27" rx="4" ry="3" fill="#A07850"/>
  <!-- Fur highlight -->
  <ellipse cx="34" cy="22" rx="8" ry="4" fill="#D4B896" opacity="0.6"/>
</svg>
