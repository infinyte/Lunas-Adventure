<svg xmlns="http://www.w3.org/2000/svg" width="40" height="20" viewBox="0 0 40 20" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .puff { fill:#E6D6C2; stroke:#BFAF9A; stroke-width:0.8; opacity:0.0; }
    </style>
  </defs>

  <!-- Three puff shapes that expand and fade over 0.4s, then disappear -->
  <g id="puffs" transform="translate(20,12)">
    <!-- left puff -->
    <ellipse class="puff" cx="-10" cy="2" rx="6" ry="3">
      <animate attributeName="opacity" values="0;0.9;0" dur="0.4s" begin="0s" fill="freeze"/>
      <animate attributeName="rx" values="6;12" dur="0.4s" begin="0s" fill="freeze"/>
      <animate attributeName="ry" values="3;6" dur="0.4s" begin="0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="-4 -2" dur="0.4s" begin="0s" fill="freeze"/>
    </ellipse>

    <!-- center puff -->
    <ellipse class="puff" cx="0" cy="0" rx="8" ry="4">
      <animate attributeName="opacity" values="0;1;0" dur="0.4s" begin="0s" fill="freeze"/>
      <animate attributeName="rx" values="8;18" dur="0.4s" begin="0s" fill="freeze"/>
      <animate attributeName="ry" values="4;9" dur="0.4s" begin="0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -3" dur="0.4s" begin="0s" fill="freeze"/>
    </ellipse>

    <!-- right puff -->
    <ellipse class="puff" cx="10" cy="2" rx="5" ry="2.6">
      <animate attributeName="opacity" values="0;0.85;0" dur="0.4s" begin="0s" fill="freeze"/>
      <animate attributeName="rx" values="5;11" dur="0.4s" begin="0s" fill="freeze"/>
      <animate attributeName="ry" values="2.6;5.5" dur="0.4s" begin="0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="4 -2" dur="0.4s" begin="0s" fill="freeze"/>
    </ellipse>
  </g>
</svg>