<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="600" viewBox="0 0 2000 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- deep cave background -->
    <linearGradient id="caveBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#071428"/>
      <stop offset="1" stop-color="#0b2a3a"/>
    </linearGradient>

    <!-- radial glows for crystals -->
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7EE6FF" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#7EE6FF" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7EE6FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#CDA6FF" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#CDA6FF" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#CDA6FF" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7FFFD4" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#7FFFD4" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#7FFFD4" stop-opacity="0"/>
    </radialGradient>

    <!-- stalactite shape -->
    <g id="stalactite">
      <path d="M0 0 L20 0 L10 80 Z" fill="#1B2A2F" stroke="#000" stroke-width="1"/>
    </g>

    <!-- crystal cluster -->
    <g id="crystalBlue">
      <path d="M0 0 L18 -40 L36 0 L18 10 Z" fill="#6FD8FF" stroke="#0B3A4A" stroke-width="1"/>
      <path d="M10 -10 L18 -40 L26 -10 Z" fill="#9FE9FF" stroke="#0B3A4A" stroke-width="0.8"/>
    </g>

    <g id="crystalPurple">
      <path d="M0 0 L16 -36 L32 0 L16 8 Z" fill="#A07BFF" stroke="#2B0F4A" stroke-width="1"/>
      <path d="M8 -8 L16 -36 L24 -8 Z" fill="#D6BFFF" stroke="#2B0F4A" stroke-width="0.8"/>
    </g>

    <!-- distant tunnel silhouette -->
    <linearGradient id="tunnel" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0f2a33"/>
      <stop offset="1" stop-color="#0b1a22"/>
    </linearGradient>
  </defs>

  <!-- BACK: deep cave wall -->
  <rect x="0" y="0" width="2000" height="600" fill="url(#caveBg)"/>

  <!-- distant tunnels and ledges -->
  <g id="distant-tunnels" opacity="0.9">
    <path d="M0 200 C300 160 600 220 900 200 C1200 180 1500 220 2000 200 L2000 600 L0 600 Z" fill="url(#tunnel)"/>
    <path d="M0 260 C250 220 500 280 800 260 C1100 240 1400 280 2000 260 L2000 600 L0 600 Z" fill="#0b2430" opacity="0.85"/>
  </g>

  <!-- stalactites hanging from top (various sizes) -->
  <g id="stalactites">
    <use href="#stalactite" transform="translate(60,0) scale(1.2)"/>
    <use href="#stalactite" transform="translate(220,0) scale(0.9)"/>
    <use href="#stalactite" transform="translate(420,0) scale(1.4)"/>
    <use href="#stalactite" transform="translate(760,0) scale(1.1)"/>
    <use href="#stalactite" transform="translate(1120,0) scale(1.3)"/>
    <use href="#stalactite" transform="translate(1560,0) scale(1.0)"/>
    <use href="#stalactite" transform="translate(1840,0) scale(1.2)"/>
  </g>

  <!-- glowing crystal clusters embedded in walls (mid layer) -->
  <g id="crystals">
    <!-- left cluster -->
    <g transform="translate(180,380)">
      <circle cx="0" cy="0" r="60" fill="url(#glowBlue)" opacity="0.9"/>
      <use href="#crystalBlue" transform="translate(-10,0)"/>
      <use href="#crystalBlue" transform="translate(20,6) scale(0.9)"/>
    </g>

    <!-- center cluster -->
    <g transform="translate(760,420)">
      <circle cx="0" cy="0" r="80" fill="url(#glowPurple)" opacity="0.95"/>
      <use href="#crystalPurple" transform="translate(-8,0) scale(1.1)"/>
      <use href="#crystalBlue" transform="translate(28,6) scale(1.0)"/>
    </g>

    <!-- right cluster -->
    <g transform="translate(1400,380)">
      <circle cx="0" cy="0" r="70" fill="url(#glowCyan)" opacity="0.9"/>
      <use href="#crystalBlue" transform="translate(-6,0) scale(1.0)"/>
      <use href="#crystalPurple" transform="translate(26,4) scale(0.9)"/>
    </g>
  </g>

  <!-- foreground rock ledges and stalagmites -->
  <g id="foreground-rocks">
    <path d="M0 520 C200 480 400 520 600 500 C800 480 1000 520 1400 500 C1700 480 2000 520 L2000 600 L0 600 Z"
          fill="#0f2a2f" stroke="#000" stroke-width="2"/>
    <!-- stalagmites -->
    <path d="M120 520 L140 480 L160 520 Z" fill="#0b1f24" stroke="#000" stroke-width="1"/>
    <path d="M420 520 L440 470 L460 520 Z" fill="#0b1f24" stroke="#000" stroke-width="1"/>
    <path d="M820 520 L840 460 L860 520 Z" fill="#0b1f24" stroke="#000" stroke-width="1"/>
    <path d="M1320 520 L1340 480 L1360 520 Z" fill="#0b1f24" stroke="#000" stroke-width="1"/>
    <path d="M1720 520 L1740 470 L1760 520 Z" fill="#0b1f24" stroke="#000" stroke-width="1"/>
  </g>

  <!-- bioluminescent moss and mushrooms (foreground accents) -->
  <g id="biolum" opacity="0.95">
    <g transform="translate(260,500)">
      <circle cx="0" cy="0" r="8" fill="#7FFFD4" opacity="0.9"/>
      <rect x="-6" y="6" width="12" height="6" fill="#0b1f24"/>
    </g>

    <g transform="translate(540,500)">
      <circle cx="0" cy="0" r="10" fill="#CDA6FF" opacity="0.9"/>
      <rect x="-6" y="8" width="12" height="6" fill="#0b1f24"/>
    </g>

    <g transform="translate(1180,500)">
      <circle cx="0" cy="0" r="9" fill="#7EE6FF" opacity="0.9"/>
      <rect x="-6" y="7" width="12" height="6" fill="#0b1f24"/>
    </g>

    <g transform="translate(1620,500)">
      <circle cx="0" cy="0" r="7" fill="#7FFFD4" opacity="0.9"/>
      <rect x="-6" y="6" width="12" height="6" fill="#0b1f24"/>
    </g>
  </g>
</svg>