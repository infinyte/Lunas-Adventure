<svg xmlns="http://www.w3.org/2000/svg" width="200" height="120" viewBox="0 0 200 120" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .outline { stroke:#000; stroke-width:1.6; stroke-linejoin:round; stroke-linecap:round; }
      .sunflower-petal { fill:#FFD24D; }
      .sunflower-center { fill:#6B3E1E; }
      .stem { fill:#2E8B3A; }
      .bush-fill { fill:#3FA34A; }
      .bush-highlight { fill:#5EC85A; }
      .flower-pink { fill:#FF6B6B; }
      .flower-blue { fill:#7EC8FF; }
      .mushroom-red { fill:#E03B3B; }
      .mushroom-stem { fill:#F6E7D0; }
      .dot { fill:#FFFFFF; }
    </style>
  </defs>

  <!-- Sunflower id="sunflower" 40x60 -->
  <g id="sunflower" transform="translate(20,10)">
    <!-- stem -->
    <rect x="18" y="28" width="4" height="32" rx="1" class="stem"/>
    <!-- leaves -->
    <path d="M20 36 q-8 -6 -12 0 q8 -2 12 0" fill="#2E8B3A" class="outline"/>
    <path d="M24 44 q8 -6 12 0 q-8 -2 -12 0" fill="#2E8B3A" class="outline"/>
    <!-- petals -->
    <g transform="translate(20,18)">
      <circle class="sunflower-center outline" cx="0" cy="0" r="8"/>
      <g>
        <ellipse class="sunflower-petal outline" cx="0" cy="-16" rx="6" ry="10"/>
        <ellipse class="sunflower-petal outline" cx="11" cy="-11" rx="6" ry="10" transform="rotate(30)"/>
        <ellipse class="sunflower-petal outline" cx="11" cy="11" rx="6" ry="10" transform="rotate(60)"/>
        <ellipse class="sunflower-petal outline" cx="0" cy="16" rx="6" ry="10" transform="rotate(90)"/>
        <ellipse class="sunflower-petal outline" cx="-11" cy="11" rx="6" ry="10" transform="rotate(120)"/>
        <ellipse class="sunflower-petal outline" cx="-11" cy="-11" rx="6" ry="10" transform="rotate(150)"/>
      </g>
    </g>
  </g>

  <!-- Round bush id="bush" 60x40 -->
  <g id="bush" transform="translate(90,50)">
    <ellipse class="bush-fill outline" cx="30" cy="20" rx="30" ry="20"/>
    <ellipse class="bush-highlight outline" cx="12" cy="12" rx="18" ry="12"/>
    <ellipse class="bush-highlight outline" cx="48" cy="12" rx="18" ry="12"/>
  </g>

  <!-- Wildflower cluster id="wildflowers" 50x30 -->
  <g id="wildflowers" transform="translate(150,70)">
    <!-- stem group -->
    <g transform="translate(0,0)">
      <rect x="6" y="6" width="2" height="18" class="stem"/>
      <rect x="18" y="8" width="2" height="16" class="stem"/>
      <rect x="30" y="4" width="2" height="20" class="stem"/>
    </g>
    <!-- flowers -->
    <g transform="translate(7,6)">
      <circle class="flower-pink outline" cx="0" cy="0" r="5"/>
      <circle class="flower-blue outline" cx="12" cy="-2" r="5"/>
      <circle class="sunflower-center outline" cx="24" cy="2" r="4"/>
    </g>
  </g>

  <!-- Red mushroom id="mushroom" 20x25 -->
  <g id="mushroom" transform="translate(40,80)">
    <path d="M10 0 C2 0 0 8 0 8 L20 8 C20 8 18 0 10 0 Z" class="mushroom-red outline"/>
    <rect x="8" y="8" width="4" height="12" class="mushroom-stem outline"/>
    <circle class="dot outline" cx="6" cy="4" r="1.6"/>
    <circle class="dot outline" cx="12" cy="3" r="1.2"/>
    <circle class="dot outline" cx="16" cy="5" r="1.2"/>
  </g>
</svg>