<svg xmlns="http://www.w3.org/2000/svg" width="680" height="40" viewBox="0 0 680 40" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .outline { stroke:#000000; stroke-width:1.6; stroke-linejoin:round; stroke-linecap:round; }
      .body { fill:#E24A2B; }        /* red-orange body */
      .wing { fill:#8B2E1E; }        /* darker wing */
      .wing-light { fill:#D9533A; }  /* lighter wing inner */
      .beak { fill:#FFC24A; }        /* yellow-orange beak */
      .eye { fill:#000000; }
      .sclera { fill:#FFFFFF; }
      .talon { fill:#F2C66A; }
      .feather { fill:#E24A2B; stroke:#000000; stroke-width:0.9; }
      .spiral { fill:none; stroke:#000000; stroke-width:1.2; stroke-linecap:round; }
      .ghost { fill:#E24A2B; opacity:0.9; }
    </style>
  </defs>

  <!-- Helper: each frame is 40x40. Translate by 40*n -->
  <!-- Idle frames 0-2: hovering, gentle wing flap -->
  <!-- Idle 0: wings mid -->
  <g transform="translate(0,0)">
    <!-- body -->
    <ellipse class="outline body" cx="20" cy="20" rx="12" ry="10"/>
    <!-- left wing -->
    <path class="outline wing" d="M10 20 q-8 -6 -6 -2 q6 6 10 6" />
    <path class="wing-light" d="M10 20 q-6 -4 -4 -1 q4 4 8 4" />
    <!-- right wing -->
    <path class="outline wing" d="M30 20 q8 -6 6 -2 q-6 6 -10 6" />
    <path class="wing-light" d="M30 20 q6 -4 4 -1 q-4 4 -8 4" />
    <!-- beak -->
    <path class="outline beak" d="M20 18 l8 -2 l-8 6 z" />
    <!-- eyes and brows -->
    <ellipse class="outline sclera" cx="16" cy="16" rx="3" ry="2.2"/>
    <ellipse class="outline sclera" cx="24" cy="16" rx="3" ry="2.2"/>
    <circle class="eye" cx="16" cy="16" r="0.9"/>
    <circle class="eye" cx="24" cy="16" r="0.9"/>
    <path class="outline" d="M13 13 L16 14" />
    <path class="outline" d="M27 13 L24 14" />
    <!-- talons tucked -->
    <path class="outline talon" d="M18 28 q2 2 4 0" />
  </g>

  <!-- Idle 1: wings up -->
  <g transform="translate(40,0)">
    <ellipse class="outline body" cx="20" cy="20" rx="12" ry="10"/>
    <path class="outline wing" d="M10 18 q-6 -10 -2 -6 q6 8 10 6" />
    <path class="wing-light" d="M10 18 q-4 -8 -1 -4 q4 6 8 5" />
    <path class="outline wing" d="M30 18 q6 -10 2 -6 q-6 8 -10 6" />
    <path class="wing-light" d="M30 18 q4 -8 1 -4 q-4 6 -8 5" />
    <path class="outline beak" d="M20 18 l8 -2 l-8 6 z" />
    <ellipse class="outline sclera" cx="16" cy="16" rx="3" ry="2.2"/>
    <ellipse class="outline sclera" cx="24" cy="16" rx="3" ry="2.2"/>
    <circle class="eye" cx="17.2" cy="16" r="0.9"/>
    <circle class="eye" cx="24.8" cy="16" r="0.9"/>
    <path class="outline" d="M13 13 L16 14" />
    <path class="outline" d="M27 13 L24 14" />
    <path class="outline talon" d="M18 28 q2 2 4 0" />
  </g>

  <!-- Idle 2: wings down -->
  <g transform="translate(80,0)">
    <ellipse class="outline body" cx="20" cy="20" rx="12" ry="10"/>
    <path class="outline wing" d="M10 22 q-8 6 -6 2 q6 -6 10 -6" />
    <path class="wing-light" d="M10 22 q-6 4 -4 1 q4 -4 8 -4" />
    <path class="outline wing" d="M30 22 q8 6 6 2 q-6 -6 -10 -6" />
    <path class="wing-light" d="M30 22 q6 4 4 1 q-4 -4 -8 -4" />
    <path class="outline beak" d="M20 18 l8 -2 l-8 6 z" />
    <ellipse class="outline sclera" cx="16" cy="16" rx="3" ry="2.2"/>
    <ellipse class="outline sclera" cx="24" cy="16" rx="3" ry="2.2"/>
    <circle class="eye" cx="15" cy="16" r="0.9"/>
    <circle class="eye" cx="23" cy="16" r="0.9"/>
    <path class="outline" d="M13 13 L16 14" />
    <path class="outline" d="M27 13 L24 14" />
    <path class="outline talon" d="M18 28 q2 2 4 0" />
  </g>

  <!-- Move frames 3-6: faster wingbeat and tilt -->
  <!-- Move 0: tilt right, wings mid -->
  <g transform="translate(120,0)">
    <g transform="translate(2,-1) rotate(6 20 20)">
      <ellipse class="outline body" cx="20" cy="20" rx="12" ry="10"/>
      <path class="outline wing" d="M10 20 q-8 -6 -6 -2 q6 6 10 6" />
      <path class="wing-light" d="M10 20 q-6 -4 -4 -1 q4 4 8 4" />
      <path class="outline wing" d="M30 20 q8 -6 6 -2 q-6 6 -10 6" />
      <path class="wing-light" d="M30 20 q6 -4 4 -1 q-4 4 -8 4" />
      <path class="outline beak" d="M20 18 l9 -3 l-9 7 z" />
      <ellipse class="outline sclera" cx="16" cy="16" rx="3" ry="2.2"/>
      <ellipse class="outline sclera" cx="24" cy="16" rx="3" ry="2.2"/>
      <circle class="eye" cx="17" cy="16" r="0.9"/>
      <circle class="eye" cx="25" cy="16" r="0.9"/>
      <path class="outline talon" d="M18 28 q2 2 4 0" />
    </g>
  </g>

  <!-- Move 1: tilt left, wings up -->
  <g transform="translate(160,0)">
    <g transform="translate(-2,-2) rotate(-6 20 20)">
      <ellipse class="outline body" cx="20" cy="20" rx="12" ry="10"/>
      <path class="outline wing" d="M10 18 q-6 -10 -2 -6 q6 8 10 6" />
      <path class="wing-light" d="M10 18 q-4 -8 -1 -4 q4 6 8 5" />
      <path class="outline wing" d="M30 18 q6 -10 2 -6 q-6 8 -10 6" />
      <path class="wing-light" d="M30 18 q4 -8 1 -4 q-4 6 -8 5" />
      <path class="outline beak" d="M20 18 l9 -3 l-9 7 z" />
      <ellipse class="outline sclera" cx="16" cy="16" rx="3" ry="2.2"/>
      <ellipse class="outline sclera" cx="24" cy="16" rx="3" ry="2.2"/>
      <circle class="eye" cx="15.5" cy="16" r="0.9"/>
      <circle class="eye" cx="23.5" cy="16" r="0.9"/>
      <path class="outline talon" d="M18 28 q2 2 4 0" />
    </g>
  </g>

  <!-- Move 2: tilt right, wings down -->
  <g transform="translate(200,0)">
    <g transform="translate(2,0) rotate(8 20 20)">
      <ellipse class="outline body" cx="20" cy="20" rx="12" ry="10"/>
      <path class="outline wing" d="M10 22 q-8 6 -6 2 q6 -6 10 -6" />
      <path class="wing-light" d="M10 22 q-6 4 -4 1 q4 -4 8 -4" />
      <path class="outline wing" d="M30 22 q8 6 6 2 q-6 -6 -10 -6" />
      <path class="wing-light" d="M30 22 q6 4 4 1 q-4 -4 -8 -4" />
      <path class="outline beak" d="M20 18 l9 -3 l-9 7 z" />
      <ellipse class="outline sclera" cx="16" cy="16" rx="3" ry="2.2"/>
      <ellipse class="outline sclera" cx="24" cy="16" rx="3" ry="2.2"/>
      <circle class="eye" cx="17.5" cy="16" r="0.9"/>
      <circle class="eye" cx="24.5" cy="16" r="0.9"/>
      <path class="outline talon" d="M18 28 q2 2 4 0" />
    </g>
  </g>

  <!-- Move 3: neutral but faster beat -->
  <g transform="translate(240,0)">
    <ellipse class="outline body" cx="20" cy="20" rx="12" ry="10"/>
    <path class="outline wing" d="M10 19 q-7 -7 -4 -3 q6 6 10 6" />
    <path class="wing-light" d="M10 19 q-5 -5 -3 -2 q4 4 8 4" />
    <path class="outline wing" d="M30 19 q7 -7 4 -3 q-6 6 -10 6" />
    <path class="wing-light" d="M30 19 q5 -5 3 -2 q-4 4 -8 4" />
    <path class="outline beak" d="M20 18 l9 -3 l-9 7 z" />
    <ellipse class="outline sclera" cx="16" cy="16" rx="3" ry="2.2"/>
    <ellipse class="outline sclera" cx="24" cy="16" rx="3" ry="2.2"/>
    <circle class="eye" cx="16.5" cy="16" r="0.9"/>
    <circle class="eye" cx="24.5" cy="16" r="0.9"/>
    <path class="outline talon" d="M18 28 q2 2 4 0" />
  </g>

  <!-- Attack frames 7-9: dive with wings tucked -->
  <!-- Attack 0: tuck and lean forward -->
  <g transform="translate(280,0)">
    <g transform="translate(0,0) rotate(12 20 20)">
      <ellipse class="outline body" cx="20" cy="18" rx="12" ry="9"/>
      <!-- tucked wings -->
      <path class="outline wing" d="M12 20 q-2 -2 0 -4 q4 -2 8 0" />
      <path class="outline wing" d="M28 20 q2 -2 0 -4 q-4 -2 -8 0" />
      <path class="outline beak" d="M20 16 l10 -4 l-10 8 z" />
      <ellipse class="outline sclera" cx="16" cy="14" rx="2.6" ry="1.8"/>
      <ellipse class="outline sclera" cx="24" cy="14" rx="2.6" ry="1.8"/>
      <circle class="eye" cx="16.6" cy="14" r="0.9"/>
      <circle class="eye" cx="24.4" cy="14" r="0.9"/>
      <path class="outline talon" d="M22 26 q3 -2 6 -4" />
    </g>
  </g>

  <!-- Attack 1: dive fast, beak forward -->
  <g transform="translate(320,0)">
    <g transform="translate(0,0) rotate(18 20 20)">
      <ellipse class="outline body" cx="20" cy="16" rx="11" ry="8"/>
      <path class="outline wing" d="M14 18 q-1 -1 1 -3 q3 -2 6 -1" />
      <path class="outline wing" d="M26 18 q1 -1 -1 -3 q-3 -2 -6 -1" />
      <path class="outline beak" d="M20 14 l12 -5 l-12 9 z" />
      <ellipse class="outline sclera" cx="16" cy="12" rx="2.4" ry="1.6"/>
      <ellipse class="outline sclera" cx="24" cy="12" rx="2.4" ry="1.6"/>
      <circle class="eye" cx="16.8" cy="12" r="0.9"/>
      <circle class="eye" cx="23.8" cy="12" r="0.9"/>
      <path class="outline talon" d="M24 24 q4 -3 8 -6" />
    </g>
  </g>

  <!-- Attack 2: recovery, wings begin to open -->
  <g transform="translate(360,0)">
    <g transform="translate(-1,1) rotate(6 20 20)">
      <ellipse class="outline body" cx="20" cy="18.5" rx="12" ry="9"/>
      <path class="outline wing" d="M10 20 q-6 -4 -4 -1 q6 6 10 6" />
      <path class="wing-light" d="M10 20 q-4 -3 -2 -1 q4 4 8 4" />
      <path class="outline wing" d="M30 20 q6 -4 4 -1 q-6 6 -10 6" />
      <path class="wing-light" d="M30 20 q4 -3 2 -1 q-4 4 -8 4" />
      <path class="outline beak" d="M20 16 l8 -3 l-8 6 z" />
      <ellipse class="outline sclera" cx="16" cy="14" rx="2.8" ry="1.9"/>
      <ellipse class="outline sclera" cx="24" cy="14" rx="2.8" ry="1.9"/>
      <circle class="eye" cx="16.5" cy="14" r="0.9"/>
      <circle class="eye" cx="24.5" cy="14" r="0.9"/>
      <path class="outline talon" d="M18 26 q2 2 4 0" />
    </g>
  </g>

  <!-- Hit frames 10-11: knocked back, ruffled feathers, spiral eyes -->
  <!-- Hit 0: ruffled feathers -->
  <g transform="translate(400,0)">
    <g transform="translate(-2,2) rotate(-10 20 20)">
      <ellipse class="outline body" cx="20" cy="22" rx="12" ry="9"/>
      <path class="outline wing" d="M10 22 q-6 6 -2 2 q6 -6 10 -6" />
      <path class="outline wing" d="M30 22 q6 6 2 2 q-6 -6 -10 -6" />
      <path class="outline beak" d="M20 20 l7 -2 l-7 6 z" />
      <ellipse class="outline sclera" cx="16" cy="18" rx="2.6" ry="1.8"/>
      <ellipse class="outline sclera" cx="24" cy="18" rx="2.6" ry="1.8"/>
      <path class="spiral" d="M15 18 c1 -2, 3 -2, 4 0 c-1 2 -3 2 -4 0" />
      <path class="spiral" d="M23 18 c1 -2, 3 -2, 4 0 c-1 2 -3 2 -4 0" />
      <path class="outline talon" d="M18 28 q2 2 4 0" />
    </g>
  </g>

  <!-- Hit 1: knocked back further, more ruffle -->
  <g transform="translate(440,0)">
    <g transform="translate(-4,3) rotate(-18 20 20)">
      <ellipse class="outline body" cx="20" cy="24" rx="12" ry="8"/>
      <path class="outline wing" d="M10 24 q-8 8 -4 3 q6 -6 10 -6" />
      <path class="outline wing" d="M30 24 q8 8 4 3 q-6 -6 -10 -6" />
      <path class="outline beak" d="M20 22 l6 -2 l-6 5 z" />
      <ellipse class="outline sclera" cx="16" cy="20" rx="2.2" ry="1.6"/>
      <ellipse class="outline sclera" cx="24" cy="20" rx="2.2" ry="1.6"/>
      <path class="spiral" d="M15 20 c1 -2, 3 -2, 4 0 c-1 2 -3 2 -4 0" />
      <path class="spiral" d="M23 20 c1 -2, 3 -2, 4 0 c-1 2 -3 2 -4 0" />
      <path class="outline talon" d="M18 30 q2 2 4 0" />
    </g>
  </g>

  <!-- Die frames 12-16: spin out, feathers scatter, fall -->
  <!-- Die 0: begin spin -->
  <g transform="translate(480,0)">
    <g transform="translate(0,0) rotate(12 20 20)">
      <ellipse class="outline body" cx="20" cy="18" rx="12" ry="9"/>
      <path class="outline wing" d="M10 20 q-6 -4 -2 -2 q6 4 10 6" />
      <path class="outline wing" d="M30 20 q6 -4 2 -2 q-6 4 -10 6" />
      <path class="outline beak" d="M20 16 l8 -3 l-8 6 z" />
      <ellipse class="outline sclera" cx="16" cy="14" rx="2.6" ry="1.8"/>
      <ellipse class="outline sclera" cx="24" cy="14" rx="2.6" ry="1.8"/>
      <circle class="eye" cx="16.6" cy="14" r="0.9"/>
      <circle class="eye" cx="24.4" cy="14" r="0.9"/>
      <!-- a few feathers starting to detach -->
      <path class="feather" d="M6 8 q2 2 4 1" />
      <path class="feather" d="M34 6 q-2 3 -4 2" />
    </g>
  </g>

  <!-- Die 1: more rotation, feathers scatter -->
  <g transform="translate(520,0)">
    <g transform="translate(0,2) rotate(28 20 20)">
      <ellipse class="outline body" cx="20" cy="20" rx="11" ry="8"/>
      <path class="outline wing" d="M12 22 q-4 4 -1 1 q6 -6 10 -6" />
      <path class="outline wing" d="M28 22 q4 4 1 1 q-6 -6 -10 -6" />
      <path class="outline beak" d="M20 18 l7 -3 l-7 6 z" />
      <ellipse class="outline sclera" cx="16" cy="16" rx="2.2" ry="1.6"/>
      <ellipse class="outline sclera" cx="24" cy="16" rx="2.2" ry="1.6"/>
      <circle class="eye" cx="16.6" cy="16" r="0.9"/>
      <circle class="eye" cx="24.4" cy="16" r="0.9"/>
      <path class="feather" d="M4 6 q3 3 6 2" />
      <path class="feather" d="M36 8 q-3 4 -6 3" />
      <path class="feather" d="M28 2 q2 3 4 2" />
    </g>
  </g>

  <!-- Die 2: body smaller, falling, feathers around -->
  <g transform="translate(560,0)">
    <g transform="translate(0,4) rotate(40 20 20)">
      <ellipse class="outline ghost" cx="20" cy="22" rx="10" ry="7"/>
      <path class="outline beak" d="M20 20 l6 -2 l-6 5 z" />
      <ellipse class="outline sclera" cx="16" cy="18" rx="2" ry="1.4"/>
      <ellipse class="outline sclera" cx="24" cy="18" rx="2" ry="1.4"/>
      <path class="feather" d="M6 10 q3 2 5 1" />
      <path class="feather" d="M34 12 q-3 3 -5 2" />
      <path class="feather" d="M22 4 q2 3 4 2" />
    </g>
  </g>

  <!-- Die 3: tiny remnant, more feathers -->
  <g transform="translate(600,0)">
    <g transform="translate(0,6) rotate(56 20 20)">
      <circle class="outline ghost" cx="20" cy="24" r="6"/>
      <path class="beak outline" d="M20 22 l5 -2 l-5 4 z" />
      <path class="feather" d="M4 12 q3 2 6 1" />
      <path class="feather" d="M36 14 q-3 3 -6 2" />
      <path class="feather" d="M28 6 q2 3 4 2" />
      <path class="feather" d="M12 4 q2 2 4 1" />
    </g>
  </g>

  <!-- Die 4: feathers only, falling off screen -->
  <g transform="translate(640,0)">
    <g>
      <path class="feather" d="M8 8 q3 2 6 1" />
      <path class="feather" d="M20 6 q2 3 4 2" />
      <path class="feather" d="M32 10 q-3 3 -6 2" />
      <path class="feather" d="M14 14 q2 2 4 1" />
      <path class="feather" d="M26 16 q2 2 4 1" />
    </g>
  </g>

</svg>
