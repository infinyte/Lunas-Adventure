<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .outline { stroke:#000000; stroke-width:1.0; stroke-linejoin:round; stroke-linecap:round; }
      .gem-main { fill:#6A3BD9; }        /* deep purple */
      .gem-dark { fill:#4A1F9A; }
      .gem-light { fill:#BFA6FF; }
      .spark { fill:#FFFFFF; stroke:#000; stroke-width:0.6; opacity:0; }
    </style>
  </defs>

  <!-- gem centered -->
  <g transform="translate(0,0)">
    <!-- diamond shape -->
    <g transform="translate(15,15)">
      <polygon class="outline gem-main" points="0,-10 8,-2 6,8 0,10 -6,8 -8,-2" />
      <!-- facet lines -->
      <path class="outline" d="M0 -10 L0 10" stroke="#000" stroke-width="0.6" />
      <path class="outline" d="M8 -2 L0 10" stroke="#000" stroke-width="0.6" />
      <path class="outline" d="M-8 -2 L0 10" stroke="#000" stroke-width="0.6" />
      <path d="M2 -6 L6 -2 L2 2 L0 -2 Z" class="gem-light outline" />
      <path d="M-2 -6 L-6 -2 L-2 2 L0 -2 Z" class="gem-dark outline" />
    </g>

    <!-- sparkles (2) with staggered fade -->
    <polygon class="spark" points="2,2 3.5,6 7,6 4,8 5,12 2,9 -1,12 0,8 -3,6 1,6"
             transform="translate(4,4) scale(0.45)">
      <animate attributeName="opacity" values="0;1;0" dur="1.0s" begin="0s" repeatCount="indefinite"/>
    </polygon>

    <polygon class="spark" points="2,2 3.5,6 7,6 4,8 5,12 2,9 -1,12 0,8 -3,6 1,6"
             transform="translate(22,6) scale(0.4)">
      <animate attributeName="opacity" values="0;1;0" dur="1.0s" begin="0.45s" repeatCount="indefinite"/>
    </polygon>
  </g>
</svg>