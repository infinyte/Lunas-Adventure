<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .badge { fill:#FFF2E6; stroke:#000; stroke-width:1.6; rx:6; ry:6; }
      .glow { fill:none; stroke:#F0C27A; stroke-width:3.6; stroke-linejoin:round; opacity:0.9; rx:6; ry:6; }
      .inner { fill:#E8C79A; stroke:#000; stroke-width:1.0; rx:4; ry:4; }
      .luna { fill:#C68642; stroke:#000; stroke-width:0.9; }
    </style>
  </defs>

  <rect class="badge" x="2" y="2" width="26" height="26" rx="6" ry="6"/>
  <rect class="glow" x="2" y="2" width="26" height="26" rx="6" ry="6">
    <animate attributeName="opacity" values="0.25;0.9;0.25" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="1.6;3.6;1.6" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <rect class="inner" x="6" y="6" width="18" height="18" rx="4" ry="4"/>

  <!-- tiny Luna silhouette (simplified guinea pig) -->
  <g transform="translate(0,0)">
    <!-- body -->
    <ellipse class="luna" cx="15" cy="17" rx="6" ry="4"/>
    <!-- head -->
    <circle class="luna" cx="11" cy="14" r="3.2"/>
    <!-- ear -->
    <circle class="luna" cx="9.2" cy="12.2" r="0.9"/>
    <!-- nose -->
    <circle class="luna" cx="10.2" cy="15" r="0.5" fill="#F4A6B0" stroke="#000" stroke-width="0.6"/>
    <!-- feet -->
    <ellipse class="luna" cx="13" cy="19.2" rx="1.2" ry="0.8"/>
    <ellipse class="luna" cx="17" cy="19.2" rx="1.2" ry="0.8"/>
  </g>
</svg>