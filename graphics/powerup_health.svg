<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .badge { fill:#FFECEC; stroke:#000; stroke-width:1.6; rx:6; ry:6; }
      .glow { fill:none; stroke:#FF6B6B; stroke-width:3.6; stroke-linejoin:round; opacity:0.9; rx:6; ry:6; }
      .inner { fill:#FF7A7A; stroke:#000; stroke-width:1.0; rx:4; ry:4; }
      .heart { fill:#FF3B5E; stroke:#000; stroke-width:0.9; }
      .plus { fill:#FFFFFF; stroke:#000; stroke-width:0.8; }
    </style>
  </defs>

  <rect class="badge" x="2" y="2" width="26" height="26" rx="6" ry="6"/>
  <rect class="glow" x="2" y="2" width="26" height="26" rx="6" ry="6">
    <animate attributeName="opacity" values="0.25;0.9;0.25" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="1.6;3.6;1.6" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <rect class="inner" x="6" y="6" width="18" height="18" rx="4" ry="4"/>

  <!-- heart with plus -->
  <g transform="translate(0,0)">
    <path class="heart" d="M15 10 C13 8,10 8,10 11 C10 14,15 17,15 17 C15 17,20 14,20 11 C20 8,17 8,15 10 Z"/>
    <rect class="plus" x="13.2" y="12.2" width="3.6" height="1.6" rx="0.6"/>
    <rect class="plus" x="14.6" y="11" width="1.6" height="4.6" rx="0.6"/>
  </g>
</svg>