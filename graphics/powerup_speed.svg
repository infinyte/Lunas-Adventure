<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .badge { fill:#FFEDC2; stroke:#000; stroke-width:1.6; rx:6; ry:6; }
      .glow { fill:none; stroke:#FFD24D; stroke-width:3.6; stroke-linejoin:round; opacity:0.9; rx:6; ry:6; }
      .inner { fill:#FFB84D; stroke:#000; stroke-width:1.0; rx:4; ry:4; }
      .bolt { fill:#FFF56A; stroke:#000; stroke-width:1.0; }
    </style>
  </defs>

  <!-- badge background -->
  <rect class="badge" x="2" y="2" width="26" height="26" rx="6" ry="6"/>

  <!-- pulsing glow border -->
  <rect class="glow" x="2" y="2" width="26" height="26" rx="6" ry="6">
    <animate attributeName="opacity" values="0.25;0.9;0.25" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="1.6;3.6;1.6" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- inner panel -->
  <rect class="inner" x="6" y="6" width="18" height="18" rx="4" ry="4"/>

  <!-- lightning bolt icon (centered) -->
  <g transform="translate(0,0)">
    <path class="bolt" d="M15 8 L11 14 L14 14 L10 20 L19 11 L16 11 L20 8 Z"/>
  </g>
</svg>