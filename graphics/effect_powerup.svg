<svg xmlns="http://www.w3.org/2000/svg" width="80" height="60" viewBox="0 0 80 60" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .ring { fill:none; stroke:#FFF7D6; stroke-width:6; opacity:0.9; stroke-linecap:round; }
      .spark { fill:#FFF9C9; stroke:#FFD24D; stroke-width:0.6; opacity:0.0; }
      .small { fill:#FFD24D; opacity:0.0; }
    </style>
  </defs>

  <g transform="translate(40,30)">
    <!-- expanding ring: starts small, grows and fades over 0.6s -->
    <circle class="ring" cx="0" cy="0" r="6">
      <animate attributeName="r" values="6;36" dur="0.6s" begin="0s" fill="freeze"/>
      <animate attributeName="opacity" values="0.95;0.6;0" dur="0.6s" begin="0s" fill="freeze"/>
      <animate attributeName="stroke-width" values="6;2" dur="0.6s" begin="0s" fill="freeze"/>
    </circle>

    <!-- inner soft glow -->
    <circle cx="0" cy="0" r="4" fill="#FFF9E0" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.5;0" dur="0.6s" begin="0s" fill="freeze"/>
      <animate attributeName="r" values="4;18" dur="0.6s" begin="0s" fill="freeze"/>
    </circle>

    <!-- scattering stars/sparkles (5) -->
    <g id="sparks">
      <polygon class="spark" points="0,-3 1,-1 3,0 1,1 0,3 -1,1 -3,0 -1,-1"
               transform="translate(0,-6) scale(0.8)">
        <animate attributeName="opacity" values="1;0" dur="0.6s" begin="0s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="0 -6" to="-28 -18" dur="0.6s" begin="0s" fill="freeze"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="90" dur="0.6s" begin="0s" additive="sum" fill="freeze"/>
      </polygon>

      <polygon class="spark" points="0,-3 1,-1 3,0 1,1 0,3 -1,1 -3,0 -1,-1"
               transform="translate(6,-4) scale(0.6)">
        <animate attributeName="opacity" values="1;0" dur="0.6s" begin="0.05s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="6 -4" to="30 -6" dur="0.6s" begin="0.05s" fill="freeze"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="45" dur="0.6s" begin="0.05s" additive="sum" fill="freeze"/>
      </polygon>

      <polygon class="spark" points="0,-3 1,-1 3,0 1,1 0,3 -1,1 -3,0 -1,-1"
               transform="translate(-6,-4) scale(0.6)">
        <animate attributeName="opacity" values="1;0" dur="0.6s" begin="0.08s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="-6 -4" to="-22 8" dur="0.6s" begin="0.08s" fill="freeze"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-30" dur="0.6s" begin="0.08s" additive="sum" fill="freeze"/>
      </polygon>

      <circle class="small" cx="10" cy="6" r="2">
        <animate attributeName="opacity" values="1;0" dur="0.6s" begin="0.12s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="28 18" dur="0.6s" begin="0.12s" fill="freeze"/>
      </circle>

      <circle class="small" cx="-10" cy="6" r="2">
        <animate attributeName="opacity" values="1;0" dur="0.6s" begin="0.14s" fill="freeze"/>
        <animateTransform attributeName="transform" type="translate" from="0 0" to="-30 12" dur="0.6s" begin="0.14s" fill="freeze"/>
      </circle>
    </g>
  </g>
</svg>