<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="600" viewBox="0 0 2000 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- wall gradient -->
    <linearGradient id="lairWall" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#4E3420"/>
      <stop offset="1" stop-color="#3B2618"/>
    </linearGradient>

    <!-- dripping stalactite color -->
    <linearGradient id="drip" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#5A3B2A"/>
      <stop offset="1" stop-color="#3B2618"/>
    </linearGradient>

    <!-- red glow for boss platform -->
    <radialGradient id="bossGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#FF6B6B" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#FF3B3B" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#FF3B3B" stop-opacity="0"/>
    </radialGradient>

    <!-- fly shape -->
    <g id="fly">
      <ellipse cx="0" cy="0" rx="6" ry="3" fill="#222" stroke="#000" stroke-width="0.6"/>
      <circle cx="-3" cy="-1" r="1.2" fill="#111"/>
    </g>

    <!-- crown icon -->
    <g id="crown">
      <path d="M0 0 L10 -14 L20 0 L30 -8 L40 0 L40 8 L0 8 Z" fill="#FFD24D" stroke="#000" stroke-width="1"/>
      <circle cx="10" cy="-8" r="2.6" fill="#E03B3B" stroke="#000" stroke-width="0.6"/>
      <circle cx="20" cy="-10" r="2.6" fill="#6ACB8A" stroke="#000" stroke-width="0.6"/>
      <circle cx="30" cy="-8" r="2.6" fill="#5DA8FF" stroke="#000" stroke-width="0.6"/>
    </g>
  </defs>

  <!-- BACK: dark lair wall -->
  <rect x="0" y="0" width="2000" height="600" fill="url(#lairWall)"/>

  <!-- lumpy organic wall texture (repeated bumps) -->
  <g id="lumps" opacity="0.95">
    <ellipse cx="200" cy="140" rx="160" ry="80" fill="#5A3B2A" opacity="0.6"/>
    <ellipse cx="600" cy="120" rx="220" ry="100" fill="#5A3B2A" opacity="0.55"/>
    <ellipse cx="1100" cy="160" rx="200" ry="90" fill="#5A3B2A" opacity="0.6"/>
    <ellipse cx="1600" cy="140" rx="180" ry="80" fill="#5A3B2A" opacity="0.55"/>
  </g>

  <!-- torches along walls (glowing red) -->
  <g id="torches">
    <g transform="translate(220,220)">
      <rect x="-6" y="0" width="12" height="60" fill="#2B1A12"/>
      <path d="M0 -6 C6 -12 12 -12 18 -6 C12 -4 6 -4 0 -6 Z" fill="#FF6B6B" opacity="0.95"/>
    </g>

    <g transform="translate(520,220)">
      <rect x="-6" y="0" width="12" height="60" fill="#2B1A12"/>
      <path d="M0 -6 C6 -12 12 -12 18 -6 C12 -4 6 -4 0 -6 Z" fill="#FF6B6B" opacity="0.95"/>
    </g>

    <g transform="translate(920,220)">
      <rect x="-6" y="0" width="12" height="60" fill="#2B1A12"/>
      <path d="M0 -6 C6 -12 12 -12 18 -6 C12 -4 6 -4 0 -6 Z" fill="#FF6B6B" opacity="0.95"/>
    </g>

    <g transform="translate(1320,220)">
      <rect x="-6" y="0" width="12" height="60" fill="#2B1A12"/>
      <path d="M0 -6 C6 -12 12 -12 18 -6 C12 -4 6 -4 0 -6 Z" fill="#FF6B6B" opacity="0.95"/>
    </g>

    <g transform="translate(1720,220)">
      <rect x="-6" y="0" width="12" height="60" fill="#2B1A12"/>
      <path d="M0 -6 C6 -12 12 -12 18 -6 C12 -4 6 -4 0 -6 Z" fill="#FF6B6B" opacity="0.95"/>
    </g>
  </g>

  <!-- ceiling stalactites dripping -->
  <g id="drips">
    <path d="M100 80 C120 60 140 80 160 70 L160 120 L100 120 Z" fill="url(#drip)"/>
    <path d="M420 60 C440 40 460 60 480 50 L480 120 L420 120 Z" fill="url(#drip)"/>
    <path d="M760 80 C780 60 800 80 820 70 L820 120 L760 120 Z" fill="url(#drip)"/>
    <path d="M1200 70 C1220 50 1240 70 1260 60 L1260 120 L1200 120 Z" fill="url(#drip)"/>
    <path d="M1600 80 C1620 60 1640 80 1660 70 L1660 120 L1600 120 Z" fill="url(#drip)"/>
  </g>

  <!-- center boss platform with dramatic red glow -->
  <g id="boss-area" transform="translate(1000,360)">
    <!-- glow -->
    <circle cx="0" cy="-40" r="220" fill="url(#bossGlow)" opacity="0.95"/>
    <!-- cracked stone platform -->
    <ellipse cx="0" cy="0" rx="360" ry="60" fill="#4A3A2E" stroke="#000" stroke-width="4"/>
    <path d="M-180 0 L-120 -10 L-60 0 L0 -12 L60 0 L120 -8 L180 0" fill="none" stroke="#2B1A12" stroke-width="3"/>
    <!-- scattered coins and crown near platform edges -->
    <g transform="translate(-220, -10) scale(0.9)">
      <use href="#crown" transform="translate(0,-8) scale(0.6)"/>
      <circle cx="40" cy="6" r="8" fill="#FFD24D" stroke="#000" stroke-width="1"/>
      <circle cx="70" cy="8" r="6" fill="#FFD24D" stroke="#000" stroke-width="1"/>
    </g>
    <g transform="translate(220, -10) scale(0.9)">
      <circle cx="0" cy="6" r="8" fill="#FFD24D" stroke="#000" stroke-width="1"/>
      <use href="#crown" transform="translate(40,-8) scale(0.5)"/>
    </g>
  </g>

  <!-- throne silhouette (left of center) -->
  <g transform="translate(980,240) scale(1.2)">
    <path d="M-120 60 C-100 20 -40 0 0 -10 C40 0 100 20 120 60 L120 120 L-120 120 Z" fill="#5A3B2A" stroke="#000" stroke-width="3"/>
    <rect x="-40" y="20" width="80" height="60" fill="#3B2618" stroke="#000" stroke-width="2"/>
    <use href="#crown" transform="translate(-20,-40) scale(0.9)"/>
  </g>

  <!-- flies buzzing in background (subtle, repeated) -->
  <g id="flies" opacity="0.95">
    <use href="#fly" transform="translate(200,160) scale(1.0)"/>
    <use href="#fly" transform="translate(360,200) scale(0.8)"/>
    <use href="#fly" transform="translate(520,150) scale(1.1)"/>
    <use href="#fly" transform="translate(820,180) scale(0.9)"/>
    <use href="#fly" transform="translate(1240,160) scale(1.0)"/>
    <use href="#fly" transform="translate(1560,200) scale(0.85)"/>
    <use href="#fly" transform="translate(1800,170) scale(1.0)"/>
  </g>

  <!-- foreground cracked stone floor -->
  <g id="floor" transform="translate(0,420)">
    <rect x="0" y="0" width="2000" height="180" fill="#2F241E"/>
    <path d="M0 440 C200 420 400 440 600 430 C800 420 1000 440 1200 430 C1400 420 1600 440 2000 430 L2000 600 L0 600 Z"
          fill="#3B2A22" stroke="#000" stroke-width="2"/>
    <!-- cracks -->
    <path d="M400 460 L420 480 L440 470" stroke="#1B0F0A" stroke-width="2"/>
    <path d="M900 460 L920 490 L940 470" stroke="#1B0F0A" stroke-width="2"/>
    <path d="M1400 460 L1420 490 L1440 470" stroke="#1B0F0A" stroke-width="2"/>
  </g>
</svg>