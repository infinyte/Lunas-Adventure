<svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30" shape-rendering="geometricPrecision">
  <defs>
    <style>
      .badge { fill:#E8F7FF; stroke:#000; stroke-width:1.6; rx:6; ry:6; }
      .glow { fill:none; stroke:#7EC8FF; stroke-width:3.6; stroke-linejoin:round; opacity:0.9; rx:6; ry:6; }
      .inner { fill:#5FBFF0; stroke:#000; stroke-width:1.0; rx:4; ry:4; }
      .arrow { fill:#FFFFFF; stroke:#000; stroke-width:0.9; }
    </style>
  </defs>

  <rect class="badge" x="2" y="2" width="26" height="26" rx="6" ry="6"/>
  <rect class="glow" x="2" y="2" width="26" height="26" rx="6" ry="6">
    <animate attributeName="opacity" values="0.25;0.9;0.25" dur="1.2s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="1.6;3.6;1.6" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <rect class="inner" x="6" y="6" width="18" height="18" rx="4" ry="4"/>

  <!-- two stacked upward arrows -->
  <g transform="translate(0,0)">
    <path class="arrow" d="M15 6 L11 11 L13 11 L13 16 L17 16 L17 11 L19 11 Z"/>
    <path class="arrow" d="M15 12 L11 17 L13 17 L13 22 L17 22 L17 17 L19 17 Z" opacity="0.95"/>
  </g>
</svg>